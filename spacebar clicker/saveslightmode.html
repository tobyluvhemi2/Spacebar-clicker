    <title>Space bar Clicker| current saves (WIP)</title>
    <link rel="shortcut icon" href="Space bar.png" type="image/x-icon">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            justify-content: space-evenly;
            align-items: center;
            height: auto;
            margin: 0;
            color: black;
            font-family: mojangles;
            user-select: none;
            background-color: white;
            text-decoration: none;
            text-decoration-color: white;
        }



        .uptdlog {
            background-color: #4a4a8f;
            margin-top: 20px;
            padding: 10px ;
            color: black;
            border-radius: 5px;
            text-decoration: none;
        }


        /* width */
        ::-webkit-scrollbar {
            width: 30px;
        }

        /* Track */
        ::-webkit-scrollbar-track {
            box-shadow: inset 0 0 5px grey;
            border-radius: 10px;
        }

        /* Handle */
        ::-webkit-scrollbar-thumb {
            background: red;
            border-radius: 10px;
        }

        /* Handle on hover */
        ::-webkit-scrollbar-thumb:hover {
            background: #b30000;
        }
    @font-face {
      font-family: mojangles; /* set name */
      src: url(mojangles.otf); /* url of the font */
        }

        
    </style>
</head>
