<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dino Game Clone (Persistent High Score yay)</title>
    <style>

        .game {
            width: 600px;
            height: 200px;
            border: 1px solid black;
            margin: auto;
            overflow: hidden;
            position: relative;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            font-family: monospace;
            text-align: right;
        }

        #dino {
            width: 50px;
            height: 50px;
            /* Update the URL or local file path below */
            background-image: url('imgs/image.png'); /* Replace with your dino image path */
            background-size: cover; /* Ensures the image fits the div size */
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        .jump {
            animation: jump 0.6s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            50% { bottom: 150px; }
            80% { bottom: 100px; }
            100% { bottom: 0; }
        }

        #cactus {
            width: 40px;
            height: 60px;
            /* Update the URL or local file path below */
            background-image: url('imgs/cactus.png'); /* Replace with your cactus image path */
            background-size: cover; /* Ensures the image fits the div size */
            position: absolute;
            bottom: 0;
            left: 580px;
            animation: block 2s infinite linear;
        }

        @keyframes block {
            0% { left: 580px; }
            100% { left: -40px; }
        }

    </style>
</head>
<body>
    <div class="game">
        <div id="scoreBoard">
            <div id="currentScore">Loading...: 0</div>
            <div id="highScoreDisplay">High Score: 0</div>
        </div>
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>



    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const currentScoreDisplay = document.getElementById("currentScore");
        const highScoreDisplay = document.getElementById("highScoreDisplay");
        let score = 0;
        let scoreInterval;
        let highScore = localStorage.getItem("highScore") || 0;

        // Display the high score immediately on load
        highScoreDisplay.textContent = "High Score: " + highScore;

        document.addEventListener("keydown", function(event) {
            jump();
        });

        function jump() {
            if (!dino.classList.contains("jump")) {
                dino.classList.add("jump");
                setTimeout(function() {
                    dino.classList.remove("jump");
                }, 600);
            }
        }

        function updateScore() {
            score++;
            currentScoreDisplay.textContent = "Score: " + score;
        }

        scoreInterval = setInterval(updateScore, 100);

        let isAlive = setInterval(function() {
            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
            let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

            if (cactusLeft > 50 && cactusLeft < 90 && dinoBottom < 50) {
                // Game Over logic
                clearInterval(isAlive);
                clearInterval(scoreInterval);
                cactus.style.animationPlayState = 'paused';
                dino.style.animationPlayState = 'paused';

                // Check and save high score
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("highScore", highScore);
                    // The alert message mentions the new high score
                    alert("New High Score! Your final score was: " + score + ". idcattall");
                } else {
                    alert("Game Over! Your final score was: " + score + ". idc");
                }
                
                // Reload the page automatically after the user clicks "OK"
                window.location.reload();
            }
        }, 1);


    </script>
</body>
</html>
